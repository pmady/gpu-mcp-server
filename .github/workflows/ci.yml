name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test -v -race -count=1 ./server/...

      - name: Vet
        run: go vet ./...

  build-cgo:
    # Compile the CGO + NVML build path (gpu/nvml.go). go-nvml loads
    # libnvidia-ml at runtime via dlopen, so the bundled headers are enough to
    # build without a GPU or driver present.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build with CGO (NVML path)
        env:
          CGO_ENABLED: "1"
        run: go build -v ./...

      - name: Vet with CGO
        env:
          CGO_ENABLED: "1"
        run: go vet ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
