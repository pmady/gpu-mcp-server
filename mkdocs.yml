site_name: gpu-mcp-server
site_url: https://gpu-mcp-server.readthedocs.io
site_description: MCP server for NVIDIA GPU metrics — give AI agents real-time access to GPU telemetry
site_author: Pavan Madduri
repo_url: https://github.com/pmady/gpu-mcp-server
repo_name: pmady/gpu-mcp-server
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Tools Reference: tools.md
  - Agent Integration: agent-integration.md
  - Roadmap: roadmap.md
  - FAQ: faq.md
  - Changelog: changelog.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
