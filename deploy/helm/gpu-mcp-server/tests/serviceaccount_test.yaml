suite: serviceaccount
templates:
  - templates/serviceaccount.yaml
tests:
  - it: is created by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-gpu-mcp-server

  - it: is not rendered when creation is disabled
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0
